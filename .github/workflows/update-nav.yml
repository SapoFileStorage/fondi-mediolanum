name: Aggiorna NAV fondi

on:
  schedule:
    # 08:30 UTC = 09:30/10:30 ora italiana, lun-sab (i NAV escono il giorno dopo)
    - cron: "30 8 * * 1-6"
  workflow_dispatch: {}   # permette il lancio manuale dalla tab Actions

permissions:
  contents: write

jobs:
  update-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scarica NAV
        run: python fetch_nav.py

      - name: Commit e push se ci sono novità
        run: |
          git config user.name "nav-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Nessun aggiornamento."
          else
            git commit -m "Aggiornamento NAV $(date -u +%F)"
            git push
          fi
